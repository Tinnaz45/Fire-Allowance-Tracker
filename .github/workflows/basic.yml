name: Build & Deploy Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build (every push/PR) ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  # ── 2. Deployment health check (main pushes only) ─────────────────────────────
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel deployment
        id: wait
        env:
          DEPLOY_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "NEXT_PUBLIC_APP_URL secret not set — skipping health check"
            echo "url=" >> $GITHUB_OUTPUT
            exit 0
          fi
          DEPLOY_URL="${DEPLOY_URL%/}"
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Polling $DEPLOY_URL ..."
          TIMEOUT=180
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/" || echo "000")
            echo "  [${ELAPSED}s] HTTP $STATUS"
            case "$STATUS" in
              200|301|302|500|403) echo "Got $STATUS — proceeding to health check"; exit 0 ;;
            esac
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          echo "WARNING: no response after ${TIMEOUT}s — proceeding anyway"
          exit 0

      - name: Run health checks
        if: steps.wait.outputs.url != ''
        run: node scripts/health-check.js "${{ steps.wait.outputs.url }}"

      - name: Annotate on failure
        if: failure()
        run: |
          echo "::error::Deployment health check failed — see step output for root cause"
          echo "::error::Fix: add NEXT_PUBLIC_SUPABASE_URL + NEXT_PUBLIC_SUPABASE_ANON_KEY to Vercel env vars"
          echo "::error::Fix: confirm vercel.json has \"framework\": \"nextjs\""
